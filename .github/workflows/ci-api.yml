name: CI — terra-app/api

on:
  push:
    branches: [main, dev]
    paths:
      - "terra-app/apps/api/**"
      - "terra-app/packages/types/**"
      - "terra-app/packages/config/**"
      - "terra-app/package.json"
      - "terra-app/pnpm-lock.yaml"
      - ".github/workflows/ci-api.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "terra-app/apps/api/**"
      - "terra-app/packages/types/**"
      - "terra-app/packages/config/**"
      - "terra-app/package.json"
      - "terra-app/pnpm-lock.yaml"
      - ".github/workflows/ci-api.yml"

defaults:
  run:
    working-directory: terra-app

jobs:
  lint-typecheck-build:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: terra-app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint api
        run: pnpm --filter @terra/api lint

      - name: Type-check api
        run: pnpm --filter @terra/api exec tsc --noEmit

      - name: Build api
        run: pnpm --filter @terra/api build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-typecheck-build

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: terra-app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @terra/api test
