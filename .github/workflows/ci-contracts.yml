name: CI — terra-app/contracts

on:
  push:
    branches: [main, dev]
    paths:
      - "terra-app/packages/contracts/**"
      - ".github/workflows/ci-contracts.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "terra-app/packages/contracts/**"
      - ".github/workflows/ci-contracts.yml"

defaults:
  run:
    working-directory: terra-app/packages/contracts

jobs:
  check:
    name: Clarinet Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Clarinet
        working-directory: .
        run: |
          CLARINET_URL=$(curl -s https://api.github.com/repos/hirosystems/clarinet/releases/latest | jq -r '.assets[] | select(.name | test("linux-x64-glibc")) | .browser_download_url')
          echo "Downloading: $CLARINET_URL"
          wget -q "$CLARINET_URL" -O clarinet.tar.gz
          tar -xzf clarinet.tar.gz
          sudo mv clarinet /usr/local/bin/
          clarinet --version

      - name: Check contracts
        run: clarinet check

  test:
    name: Clarinet Test
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - name: Install Clarinet
        working-directory: .
        run: |
          CLARINET_URL=$(curl -s https://api.github.com/repos/hirosystems/clarinet/releases/latest | jq -r '.assets[] | select(.name | test("linux-x64-glibc")) | .browser_download_url')
          wget -q "$CLARINET_URL" -O clarinet.tar.gz
          tar -xzf clarinet.tar.gz
          sudo mv clarinet /usr/local/bin/
          clarinet --version

      - name: Run contract tests
        run: clarinet test
