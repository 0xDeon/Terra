name: CI — terra-app/contracts

on:
  push:
    branches: [main, dev]
    paths:
      - "terra-app/packages/contracts/**"
      - ".github/workflows/ci-contracts.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "terra-app/packages/contracts/**"
      - ".github/workflows/ci-contracts.yml"

defaults:
  run:
    working-directory: terra-app/packages/contracts

jobs:
  check:
    name: Clarinet Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Clarinet
        working-directory: .
        run: |
          wget -q $(curl -s https://api.github.com/repos/hirosystems/clarinet/releases/latest | grep -o 'https://.*clarinet-linux-x64-glibc.tar.gz')
          tar -xzf clarinet-linux-x64-glibc.tar.gz
          sudo mv clarinet /usr/local/bin/
          clarinet --version

      - name: Check contracts
        run: clarinet check

  test:
    name: Clarinet Test
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - name: Install Clarinet
        working-directory: .
        run: |
          wget -q $(curl -s https://api.github.com/repos/hirosystems/clarinet/releases/latest | grep -o 'https://.*clarinet-linux-x64-glibc.tar.gz')
          tar -xzf clarinet-linux-x64-glibc.tar.gz
          sudo mv clarinet /usr/local/bin/
          clarinet --version

      - name: Run contract tests
        run: clarinet test
