name: CI — terra-website

on:
  push:
    branches: [main, dev]
    paths:
      - "terra-website/**"
      - ".github/workflows/ci-website.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "terra-website/**"
      - ".github/workflows/ci-website.yml"

defaults:
  run:
    working-directory: terra-website

jobs:
  lint-typecheck-build:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: terra-website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
