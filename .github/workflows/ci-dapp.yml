name: CI — terra-app/dapp

on:
  push:
    branches: [main, dev]
    paths:
      - "terra-app/apps/dapp/**"
      - "terra-app/packages/ui/**"
      - "terra-app/packages/types/**"
      - "terra-app/packages/config/**"
      - "terra-app/package.json"
      - "terra-app/pnpm-lock.yaml"
      - ".github/workflows/ci-dapp.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "terra-app/apps/dapp/**"
      - "terra-app/packages/ui/**"
      - "terra-app/packages/types/**"
      - "terra-app/packages/config/**"
      - "terra-app/package.json"
      - "terra-app/pnpm-lock.yaml"
      - ".github/workflows/ci-dapp.yml"

defaults:
  run:
    working-directory: terra-app

jobs:
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: terra-app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint dapp
        run: pnpm --filter @terra/dapp lint

      - name: Type-check dapp
        run: pnpm --filter @terra/dapp exec tsc --noEmit

  expo-export:
    name: Expo Export Validation
    runs-on: ubuntu-latest
    needs: lint-typecheck

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: terra-app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Expo export
        run: pnpm --filter @terra/dapp build
