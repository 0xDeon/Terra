name: CI — terra-intelligence

on:
  push:
    branches: [main, dev]
    paths:
      - "terra-intelligence/**"
      - ".github/workflows/ci-intelligence.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "terra-intelligence/**"
      - ".github/workflows/ci-intelligence.yml"

defaults:
  run:
    working-directory: terra-intelligence

jobs:
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: terra-intelligence/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint with ruff
        run: ruff check .

      - name: Type-check with mypy
        run: mypy api/ services/ --ignore-missing-imports

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-typecheck

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: terra-intelligence/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest -v || echo "No tests found yet — scaffold only"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-typecheck

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: terra-intelligence
          push: false
          tags: terra-intelligence:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
